queries:
  statements.pg_stat_statements_capabilities:
    title: pg_stat_statements Capability Check
    database_scope: current_database
    group: SQL Workload
    main_view: pg_extension
    description: Extension, preload, query-id, and tracking settings needed for statement workload diagnostics.
    display:
      default_sort:
        column: capability
        direction: asc
    evaluation:
      summary_title: pg_stat_statements evidence is incomplete
      recommendation: Fix extension activation or visibility only under the site's change and least-privilege policy; pg_diag never resets statement statistics.
    collection:
      default: once
      supports: [once]
    variants:
      - id: statements_pgss_capabilities_pg10_plus
        min_pg_version: 100000
        sql_file: statements/pg_stat_statements_capabilities.sql

  statements.top_by_total_time:
    title: Top SQL By Total Time
    database_scope: current_database
    group: SQL Workload
    main_view: pg_stat_statements
    description: Statements with the highest cumulative execution time.
    optional: true
    cost: medium
    display:
      default_sort:
        column: total_exec_time_ms
        direction: desc
    evaluation: &statement_visibility_evaluation
      summary_title: Some Top SQL identities are hidden
      recommendation: Use a dedicated monitoring role with pg_read_all_stats only when cross-user SQL visibility is approved; raw counters remain useful but hidden statements cannot be safely attributed.
    collection:
      default: once
      supports: [once]
    variants:
      - id: statements_top_by_total_time_pg10_pg12
        min_pg_version: 100000
        max_pg_version: 129999
        sql_file: statements/top_by_total_time_pg10_pg12.sql
      - id: statements_top_by_total_time_pg13
        min_pg_version: 130000
        max_pg_version: 139999
        sql_file: statements/top_by_total_time_pg13.sql
      - id: statements_top_by_total_time_pg14_pg16
        min_pg_version: 140000
        max_pg_version: 169999
        sql_file: statements/top_by_total_time.sql
        semantic_columns: &statement_semantics
          dimensions:
            database: datname
            user: rolname
            database_id: dbid
            user_id: userid
            query_id: query_id
            toplevel: toplevel
          counters:
            calls: calls
            rows: rows
            total_plan_time_ms: total_plan_time_ms
            total_exec_time_ms: total_exec_time_ms
            shared_blks_hit: shared_blks_hit
            shared_blks_read: shared_blks_read
            shared_blks_dirtied: shared_blks_dirtied
            shared_blks_written: shared_blks_written
            temp_blks_read: temp_blks_read
            temp_blks_written: temp_blks_written
            blk_read_time_ms: blk_read_time_ms
            blk_write_time_ms: blk_write_time_ms
            wal_records: wal_records
            wal_fpi: wal_fpi
            wal_bytes: wal_bytes
          gauges:
            mean_exec_time_ms: mean_exec_time_ms
      - id: statements_top_by_total_time_pg17_plus
        min_pg_version: 170000
        max_pg_version: 179999
        sql_file: statements/top_by_total_time_pg17_plus.sql
        semantic_columns: *statement_semantics
      - id: statements_top_by_total_time_pg18_plus
        min_pg_version: 180000
        sql_file: statements/top_by_total_time_pg18_plus.sql
        semantic_columns: *statement_semantics

