  buffer_cache.relation_coverage:
    title: Relation Cache Coverage Chart Source
    database_scope: current_database
    group: Buffer Cache
    main_view: pg_buffercache
    description: Cached percentage for the top current-database relations with known physical sizes.
    display: {default_sort: {column: coverage_pct, direction: desc}}
    collection: {default: every_snapshot, supports: [once, every_snapshot]}
