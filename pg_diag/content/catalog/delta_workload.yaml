            database_id: dbid
            user_id: userid
            query_id: query_id
            toplevel: toplevel
            kcache_stats_since: kcache_stats_since
          counters:
            calls: calls
            exec_reads: exec_reads
            exec_writes: exec_writes
            exec_io_bytes: exec_io_bytes

  metrics.sql_cpu_efficiency_delta:
