      - id: metrics_recovery_conflicts_delta_pg16_plus
        min_pg_version: 160000
        sql_file: metrics/recovery_conflicts_delta.sql
        semantic_columns: *recovery_conflicts_semantics

  metrics.database_session_outcomes_delta:
