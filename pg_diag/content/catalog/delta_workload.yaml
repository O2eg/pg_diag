queries:
  metrics.sql_kernel_cpu_delta:
    title: SQL Kernel CPU Delta Source
    database_scope: current_database
    group: Metric Sources
    main_view: pg_stat_kcache
    description: Bounded pg_stat_kcache execution CPU counters used only by SQL Kernel CPU Delta.
    source: pg_diag
    optional: true
    cost: medium
    display: {default_sort: {column: exec_cpu_time, direction: desc}}
    collection: &kcache_window_endpoints
      default: window_endpoints
      supports: [once, window_endpoints]
    variants:
      - id: metrics_sql_kernel_cpu_delta_pg10_plus
        min_pg_version: 100000
        sql_file: metrics/sql_kernel_cpu_delta.sql
        semantic_columns:
          dimensions:
            database: datname
            user: rolname
            database_id: dbid
            user_id: userid
            query_id: query_id
            toplevel: toplevel
            kcache_stats_since: kcache_stats_since
          counters:
            calls: calls
            exec_user_time: exec_user_time
            exec_system_time: exec_system_time
            exec_cpu_time: exec_cpu_time

  metrics.sql_filesystem_io_delta:
    title: SQL Filesystem I/O Delta Source
    database_scope: current_database
    group: Metric Sources
    main_view: pg_stat_kcache
