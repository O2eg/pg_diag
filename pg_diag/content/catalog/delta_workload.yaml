            state: state
            sync_state: sync_state
          counters:
            current_wal_bytes: current_wal_bytes
            sent_bytes: sent_bytes
            write_bytes: write_bytes
            flush_bytes: flush_bytes
            replay_bytes: replay_bytes

  metrics.statements_planning_delta:
