    collection: *kcache_window_endpoints
    requirements:
      unsupported_versions_reason: Planning kernel counters require PostgreSQL 13 or newer.
    variants:
      - id: metrics_sql_planning_kernel_delta_pg13_plus
        min_pg_version: 130000
        sql_file: metrics/sql_planning_kernel_delta.sql
        semantic_columns:
