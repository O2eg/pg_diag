            analyze_count: analyze_count
            autoanalyze_count: autoanalyze_count
            maintenance_count: maintenance_count
            vacuum_time_ms: vacuum_time_ms
            autovacuum_time_ms: autovacuum_time_ms
            analyze_time_ms: analyze_time_ms
            autoanalyze_time_ms: autoanalyze_time_ms
            maintenance_time_ms: maintenance_time_ms
        column_statuses:
          vacuum_time_ms: {status: unsupported, reason: Per-table maintenance timing counters are available from PostgreSQL 18.}
          autovacuum_time_ms: {status: unsupported, reason: Per-table maintenance timing counters are available from PostgreSQL 18.}
          analyze_time_ms: {status: unsupported, reason: Per-table maintenance timing counters are available from PostgreSQL 18.}
          autoanalyze_time_ms: {status: unsupported, reason: Per-table maintenance timing counters are available from PostgreSQL 18.}
          maintenance_time_ms: {status: unsupported, reason: Per-table maintenance timing counters are available from PostgreSQL 18.}
      - id: metrics_objects_table_maintenance_delta_pg18_plus
        min_pg_version: 180000
        sql_file: metrics/objects_table_maintenance_delta.sql
        semantic_columns: *table_maintenance_semantics

