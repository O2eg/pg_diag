  metrics.statements_temp_io_delta:
    title: SQL Temp I/O Delta Source
    database_scope: current_database
    group: Metric Sources
    main_view: pg_stat_statements
    description: Bounded statement temporary I/O counters used only by SQL Temp I/O Delta.
    source: pg_diag
    optional: true
    display:
      default_sort:
        column: temp_io_bytes
        direction: desc
    collection: &window_endpoints
      default: window_endpoints
      supports: [once, window_endpoints]
    variants:
      - id: metrics_statements_temp_io_delta_pg10_pg13
        min_pg_version: 100000
        max_pg_version: 139999
        sql_file: metrics/statements_temp_io_delta_pg10_pg13.sql
        semantic_columns: &statement_temp_io_semantics
          dimensions:
            database: datname
            user: rolname
            database_id: dbid
            user_id: userid
            query_id: query_id
            toplevel: toplevel
            global_stats_reset: global_stats_reset
          counters: &statement_temp_io_counters
            temp_blks_read: temp_blks_read
            temp_blks_written: temp_blks_written
            temp_io_bytes: temp_io_bytes
            temp_read_time_ms: temp_read_time_ms
            temp_write_time_ms: temp_write_time_ms
      - id: metrics_statements_temp_io_delta_pg14_pg16
        min_pg_version: 140000
        max_pg_version: 169999
        sql_file: metrics/statements_temp_io_delta.sql
        semantic_columns: *statement_temp_io_semantics
      - id: metrics_statements_temp_io_delta_pg17_plus
        min_pg_version: 170000
        sql_file: metrics/statements_temp_io_delta_pg17_plus.sql
        semantic_columns:
          dimensions:
            database: datname
            user: rolname
            database_id: dbid
            user_id: userid
            query_id: query_id
            toplevel: toplevel
            global_stats_reset: global_stats_reset
            entry_stats_since: entry_stats_since
          counters: *statement_temp_io_counters

  metrics.io_activity_delta:
    title: PostgreSQL I/O Delta Source
    database_scope: all_databases
    group: Metric Sources
    main_view: pg_stat_io
    description: Cluster I/O counters by backend type, object, and context.
    source: pg_diag
    display:
      default_sort:
        column: total_bytes
        direction: desc
    collection: *window_endpoints
    requirements:
      unsupported_versions_reason: pg_stat_io exists in PostgreSQL 16 and newer.
    variants:
      - id: metrics_io_activity_delta_pg16_pg17
        min_pg_version: 160000
        max_pg_version: 179999
        sql_file: metrics/io_activity_delta_pg16_pg17.sql
        semantic_columns: &io_activity_semantics
          dimensions:
            backend_type: backend_type
            object: object
            context: context
            stats_reset: stats_reset
          counters:
            reads: reads
            read_bytes: read_bytes
            read_time_ms: read_time_ms
            writes: writes
            write_bytes: write_bytes
            write_time_ms: write_time_ms
            writebacks: writebacks
            writeback_time_ms: writeback_time_ms
            extends: extends
            extend_bytes: extend_bytes
            extend_time_ms: extend_time_ms
            fsyncs: fsyncs
            fsync_time_ms: fsync_time_ms
            hits: hits
            evictions: evictions
            reuses: reuses
            total_bytes: total_bytes
      - id: metrics_io_activity_delta_pg18_plus
        min_pg_version: 180000
        sql_file: metrics/io_activity_delta_pg18_plus.sql
        semantic_columns: *io_activity_semantics

  metrics.checkpointer_delta:
    title: Checkpointer Delta Source
    database_scope: all_databases
    group: Metric Sources
    main_view: pg_stat_checkpointer
    description: Checkpoint and restartpoint counters over the snapshot window.
    source: pg_diag
    display:
      default_sort:
        column: checkpoints_done
        direction: desc
    collection: *window_endpoints
    variants:
      - id: metrics_checkpointer_delta_pg14_pg16
        min_pg_version: 100000
        max_pg_version: 169999
        sql_file: metrics/checkpointer_delta_pg14_pg16.sql
        semantic_columns: &checkpointer_semantics
          dimensions:
            scope: scope
            stats_reset: stats_reset
          counters:
            checkpoints_timed: checkpoints_timed
            checkpoints_requested: checkpoints_requested
            checkpoints_done: checkpoints_done
            restartpoints_timed: restartpoints_timed
            restartpoints_requested: restartpoints_requested
            restartpoints_done: restartpoints_done
            write_time_ms: write_time_ms
            sync_time_ms: sync_time_ms
            buffers_written: buffers_written
            slru_written: slru_written
        column_statuses:
          restartpoints_timed: {status: unsupported, reason: Restartpoint counters moved into pg_stat_checkpointer in PostgreSQL 17.}
          restartpoints_requested: {status: unsupported, reason: Restartpoint counters moved into pg_stat_checkpointer in PostgreSQL 17.}
          restartpoints_done: {status: unsupported, reason: Restartpoint counters moved into pg_stat_checkpointer in PostgreSQL 17.}
          slru_written: {status: unsupported, reason: The slru_written checkpointer counter is available from PostgreSQL 18.}
      - id: metrics_checkpointer_delta_pg17
        min_pg_version: 170000
        max_pg_version: 179999
        sql_file: metrics/checkpointer_delta_pg17.sql
        semantic_columns: *checkpointer_semantics
        column_statuses:
          slru_written: {status: unsupported, reason: The slru_written checkpointer counter is available from PostgreSQL 18.}
      - id: metrics_checkpointer_delta_pg18_plus
        min_pg_version: 180000
        sql_file: metrics/checkpointer_delta_pg18_plus.sql
        semantic_columns: *checkpointer_semantics

  metrics.wal_activity_delta:
