queries:
  replication.physical_replication:
    title: Physical Replication Senders
    group: Replication
    main_view: pg_stat_replication
    description: WAL sender LSN positions and reply lag.
    source: postgresai
    display:
      default_sort:
        column: current_to_replay_lag_bytes
        direction: desc
    evaluation:
      summary_title: Replication sender state requires review
      recommendation: Confirm the expected topology and inspect sender, receiver, network, and standby logs before changing replication settings.
    collection:
      default: once
      supports: [once, every_snapshot]
    variants:
      - id: replication_physical_replication_all
        min_pg_version: 100000
        sql_file: replication/physical_replication.sql
        semantic_columns:
          dimensions:
            application_name: application_name
          gauges:
            current_to_replay_lag_bytes: current_to_replay_lag_bytes
            replay_lag_seconds: replay_lag_seconds

  replication.wal_receiver:
    title: WAL Receiver
    group: Replication
    main_view: pg_stat_wal_receiver
    description: WAL receiver status and upstream host data for standby servers.
    source: postgresai
    display:
      default_sort:
        column: seconds_since_last_message
        direction: desc
    evaluation:
      summary_title: WAL receiver state requires review
      recommendation: Confirm whether streaming or archive-only recovery is expected, then inspect upstream reachability and standby logs.
    collection:
      default: once
      supports: [once, every_snapshot]
    variants:
      - id: replication_wal_receiver_all
        min_pg_version: 100000
        sql_file: replication/wal_receiver.sql

  replication.database_conflicts:
    title: Standby Recovery Conflicts
    database_scope: all_databases
    group: Replication
    main_view: pg_stat_database_conflicts
    description: Recovery conflict counters for standby databases.
    source: PostgreSQL docs
    display:
      default_sort:
        column: conflicts_total
        direction: desc
    evaluation:
      summary_title: Standby recovery conflicts have occurred
      recommendation: Compare counter deltas with canceled-query logs before changing hot_standby_feedback or delay settings.
    collection:
      default: once
      supports: [once, every_snapshot]
    variants:
      - id: replication_database_conflicts_pg09_pg17
        min_pg_version: 90400
        max_pg_version: 179999
        sql_file: replication/database_conflicts_pg09_pg17.sql
      - id: replication_database_conflicts_pg18_plus
        min_pg_version: 180000
        sql_file: replication/database_conflicts_pg18_plus.sql

  replication.subscription_workers:
    title: Logical Replication Subscription Workers
    database_scope: current_database
    group: Replication
    main_view: pg_stat_subscription
    description: Logical replication subscription worker state and LSN progress.
    source: PostgreSQL docs
    display:
      default_sort:
        column: worker_running
        direction: desc
    collection:
      default: once
      supports: [once, every_snapshot]
    variants:
      - id: replication_subscription_workers_pg14
        min_pg_version: 140000
        max_pg_version: 149999
        sql_file: replication/subscription_workers_pg14.sql
        column_statuses:
          leader_pid: {status: unsupported, reason: PostgreSQL 14 does not expose subscription worker leader_pid.}
          apply_error_count: {status: unsupported, reason: pg_stat_subscription_stats is available from PostgreSQL 15.}
          sync_error_count: {status: unsupported, reason: pg_stat_subscription_stats is available from PostgreSQL 15.}
          conflict_count: {status: unsupported, reason: Logical replication conflict counters are available from PostgreSQL 18.}
          subscription_stats_reset: {status: unsupported, reason: pg_stat_subscription_stats is available from PostgreSQL 15.}
      - id: replication_subscription_workers_pg15
        min_pg_version: 150000
        max_pg_version: 159999
        sql_file: replication/subscription_workers_pg15.sql
        column_statuses:
          leader_pid: {status: unsupported, reason: PostgreSQL 15 does not expose subscription worker leader_pid.}
          conflict_count: {status: unsupported, reason: Logical replication conflict counters are available from PostgreSQL 18.}
      - id: replication_subscription_workers_pg16
        min_pg_version: 160000
        max_pg_version: 169999
        sql_file: replication/subscription_workers_pg16.sql
        column_statuses:
          conflict_count: {status: unsupported, reason: Logical replication conflict counters are available from PostgreSQL 18.}
      - id: replication_subscription_workers_pg17
        min_pg_version: 170000
        max_pg_version: 179999
        sql_file: replication/subscription_workers_pg17.sql
        column_statuses:
          conflict_count: {status: unsupported, reason: Logical replication conflict counters are available from PostgreSQL 18.}
      - id: replication_subscription_workers_pg18_plus
        min_pg_version: 180000
        sql_file: replication/subscription_workers_pg18.sql

  replication.recovery_prefetch:
    title: Recovery Prefetch
    group: Replication
    main_view: pg_stat_recovery_prefetch
    description: Recovery prefetch decisions and skip reasons.
    source: PostgreSQL docs
    display:
      default_sort:
        column: decisions_total
        direction: desc
    collection:
      default: once
      supports: [once, every_snapshot]
    requirements:
      unsupported_versions_reason: pg_stat_recovery_prefetch is available only on newer PostgreSQL versions.
    variants:
      - id: replication_recovery_prefetch_pg15_plus
        min_pg_version: 150000
        sql_file: replication/recovery_prefetch_pg15.sql
