queries:
  metrics.database_transaction_rate:
    title: Database Transaction Rate Chart Source
    database_scope: all_databases
    group: Metric Sources
    main_view: pg_stat_database
    description: Minimal cumulative transaction counters used by the transaction-rate chart.
    source: pg_diag
    display:
      default_sort:
        column: datname
        direction: asc
    collection:
      default: every_snapshot
      supports: [once, every_snapshot]
    variants:
      - id: metrics_database_transaction_rate_pg14_plus
        min_pg_version: 100000
        sql_file: metrics/database_transaction_rate.sql
        semantic_columns:
          dimensions:
            database: datname
          counters:
            xact_commit: xact_commit
            xact_rollback: xact_rollback

  metrics.wal_growth_rate:
    title: WAL Growth Rate Chart Source
    group: Metric Sources
    main_view: pg_stat_wal
    description: Minimal cluster-wide cumulative WAL byte counter used by the WAL growth-rate chart.
    source: pg_diag
    display:
      default_sort:
        column: scope
        direction: asc
    collection:
      default: every_snapshot
      supports: [once, every_snapshot]
    variants:
      - id: metrics_wal_growth_rate_pg14_plus
        min_pg_version: 140000
        sql_file: metrics/wal_growth_rate.sql
        semantic_columns:
          dimensions:
            scope: scope
          counters:
            wal_bytes: wal_bytes

  metrics.io_read_write_rate:
    title: I/O Read And Write Rate Chart Source
    group: Metric Sources
    main_view: pg_stat_io
    description: Minimal cluster-wide PostgreSQL read/write byte counters by backend type, excluding a duplicate total rollup.
    source: pg_diag
    display:
      default_sort:
        column: backend_type
        direction: asc
    collection:
      default: every_snapshot
      supports: [once, every_snapshot]
    requirements:
      unsupported_versions_reason: pg_stat_io exists in PostgreSQL 16+.
    variants:
      - id: metrics_io_read_write_rate_pg16_pg17
        min_pg_version: 160000
        max_pg_version: 179999
        sql_file: metrics/io_read_write_rate_pg16_pg17.sql
        semantic_columns: &metrics_io_read_write_rate_semantics
          dimensions:
            scope: scope
            backend_type: backend_type
          counters:
            read_bytes: read_bytes
            write_bytes: write_bytes
      - id: metrics_io_read_write_rate_pg18_plus
        min_pg_version: 180000
        sql_file: metrics/io_read_write_rate_pg18_plus.sql
        semantic_columns: *metrics_io_read_write_rate_semantics

  metrics.activity_sessions_by_state:
    title: Sessions By State Chart Source
    database_scope: all_databases
    group: Metric Sources
    main_view: pg_stat_activity
    description: Narrow sampled SQL source used only by the Sessions By State Chart item.
    source: pg_diag
    display:
      default_sort:
        column: state
        direction: asc
    collection:
      default: every_snapshot
      supports: [once, every_snapshot]
    variants:
      - id: metrics_activity_sessions_by_state_pg14_plus
        min_pg_version: 100000
        sql_file: metrics/activity_sessions_by_state.sql
        semantic_columns:
          dimensions:
            database: datname
            state: state
          gauges:
            sessions: count

  metrics.activity_wait_sample_profile:
    title: Wait Event Sample Profile Source
