  objects.table_scan_delta:
    title: Table Scan Delta
    database_scope: current_database
    source_query: metrics.objects_table_scan_delta
    requires_collection: window_endpoints
    result: table
    display:
      default_sort:
        column: seq_tup_read_delta
        direction: desc
    evaluation:
      summary_title: Sustained sequential-scan workload requires review
      recommendation: Confirm that the table is intentionally scanned, then inspect representative plans and index selectivity before creating an index.
      rules:
        - severity: medium
          reason: A table exceeded both 10 sequential scans/s and 10000 sequential tuples read/s
          all:
            - column: seq_scans_per_sec
              operator: gte
              value: 10
            - column: seq_tup_read_per_sec
              operator: gte
              value: 10000
    table:
      key_refs: [dimensions.database_id, dimensions.relation_id]
      epoch_refs: [dimensions.database_stats_reset]
      limit: 50
      sort:
        column: seq_tup_read_delta
