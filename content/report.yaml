report:
  id: pg_diag_minimal
  title: PostgreSQL Diagnostic Report
  schema_version: 3
  catalogs:
    queries: queries.yaml
    scripts: scripts.yaml
    metrics: metrics.yaml
    python: python.yaml
    instructions: instructions
    field_reference: field_reference.yaml

runtime_policy:
  default_sql_timeout_ms: 3000
  default_shell_timeout_ms: 5000
  remote_db_only_shell_message: "no data because remote call"
  table_columns: dynamic_from_result
  fail_fast: false

defaults:
  table:
    page_size: 25
  item:
    state: expanded
    database_scope: all_databases
  section:
    state: expanded

sections:
  overview:
    title: Overview
    description: PostgreSQL version and server configuration snapshot.
    items:
      server_version:
        query: cluster.server_version
        tags: [Configuration]
      pg_settings:
        query: cluster.settings
        tags: [Configuration]
        state: collapsed
      stat_reset_times:
        query: cluster.stat_reset_times
        tags: [Databases]
        state: collapsed
      security_logging_settings:
        query: security.security_logging_settings
        tags: [Security]
        state: collapsed
        render:
          empty_message: Security logging settings match the expected audit posture.
      password_encryption:
        query: security.password_encryption
        tags: [Security]
        state: collapsed
        render:
          empty_message: password_encryption is set to scram-sha-256.
      password_complexity:
        query: security.password_complexity
        tags: [Security]
        state: collapsed
        render:
          empty_message: Password complexity hooks are active.
      auth_timeout_delay:
        query: security.auth_timeout_delay
        tags: [Security]
        state: collapsed
        render:
          empty_message: Authentication timeout and failed-authentication delay settings match the expected posture.
      listen_addresses_exposure:
        query: security.listen_addresses_exposure
        tags: [Security]
        state: collapsed
        render:
          empty_message: listen_addresses does not expose PostgreSQL beyond loopback.
      tls_server_configuration:
        query: security.tls_server_configuration
        tags: [Security]
        state: collapsed
        render:
          empty_message: TLS server settings match the expected posture.
      weak_tls_ciphers:
        query: security.weak_tls_ciphers
        tags: [Security]
        state: collapsed
        render:
          empty_message: ssl_ciphers does not allow weak or medium-strength cipher classes.
      database_stats:
        query: database.database_stats
        tags: [Databases]
        state: collapsed

