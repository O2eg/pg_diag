queries:
  security.privileged_login_roles:
    title: Privileged Login Roles
    group: Cluster Inventory
    main_view: pg_roles
    description: Login roles with cluster-level administrative privileges.
    display:
      default_sort:
        column: risk_level
        direction: desc
    collection:
      default: once
      supports: [once]
    variants:
      - id: security_privileged_login_roles_pg14_plus
        min_pg_version: 140000
        sql_file: security/privileged_login_roles.sql

  security.predefined_admin_role_membership:
    title: Predefined Admin Role Membership
    group: Cluster Inventory
    main_view: pg_auth_members
    description: Non-superuser roles that inherit powerful predefined PostgreSQL roles.
