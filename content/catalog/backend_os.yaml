queries:
  backend.activity:
    title: Backend Activity By PID
    group: Per-Backend Local OS
    main_view: pg_stat_activity
    description: Current backend state by PID for correlation with local /proc CPU and I/O samples.
    display:
      default_sort:
        column: query_age_seconds
        direction: desc
    collection:
      default: every_snapshot
      supports: [once, every_snapshot]
    variants:
      - id: backend_activity_pg14_plus
        min_pg_version: 140000
        sql_file: backend/activity.sql
        semantic_columns:
          dimensions:
            pid: pid
            database: datname
            state: state
            wait_event_type: wait_event_type
            wait_event: wait_event
            query_id: query_id
          gauges:
            query_age_seconds: query_age_seconds
            xact_age_seconds: xact_age_seconds
