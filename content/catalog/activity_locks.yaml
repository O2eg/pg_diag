queries:
  activity.session_states:
    title: Session States
    group: Activity & Locks
    main_view: pg_stat_activity
    description: Session counts by database, application, and state with max transaction age.
    source: postgresai
    display:
      default_sort:
        column: count
        direction: desc
    collection:
      default: once
      supports: [once, every_snapshot]
    variants:
      - id: activity_session_states_all
        min_pg_version: 90400
        sql_file: activity/session_states.sql
        semantic_columns:
          dimensions:
            database: datname
            state: state
          gauges:
            sessions: count
            max_tx_duration_seconds: max_tx_duration

  locks.lock_waits:
    title: Lock Waits
    group: Activity & Locks
    main_view: pg_locks
    description: Blocked and blocking sessions for current lock waits.
    source: postgresai
    cost: medium
    display:
      default_sort:
        column: blocked_ms
        direction: desc
    collection:
      default: once
      supports: [once, every_snapshot]
    variants:
      - id: locks_lock_waits_all
        min_pg_version: 120000
        sql_file: locks/lock_waits.sql
