    source: queries_collection/pg_index_dba_tables_without_pk_or_unique_db_converter.md
    cost: medium
    display:
      default_sort:
        column: total_relation_size_bytes
        direction: desc
    collection:
      default: once
      supports: [once]
    variants:
      - id: indexes_tables_without_pk_or_unique_pg14_plus
        min_pg_version: 140000
        sql_file: indexes/tables_without_pk_or_unique.sql

  indexes.large_indexes:
    title: Indexes Large Relative To Table
    group: Index Health
    main_view: pg_index
    description: Indexes larger than half of the table heap, with usage counters.
    source: queries_collection/pg_index_dba_idx_large_relative_to_table_db_converter.md
    cost: medium
    display:
      default_sort:
        column: index_to_table_pct
        direction: desc
    collection:
      default: once
      supports: [once]
    variants:
      - id: indexes_large_indexes_pg14_plus
        min_pg_version: 140000
        sql_file: indexes/large_indexes.sql

  cluster.extensions:
    title: Available Extensions
    group: Cluster Inventory
    main_view: pg_available_extensions
    description: Server extensions with installed/default versions.
    display:
      default_sort:
        column: installed
        direction: desc
    collection:
      default: once
      supports: [once]
    variants:
      - id: cluster_extensions_pg14_plus
        min_pg_version: 140000
        sql_file: cluster/extensions.sql

  cluster.roles_privileges:
