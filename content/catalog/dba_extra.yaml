    cost: medium
    display:
      default_sort:
        column: total_index_size_bytes
        direction: desc
    collection:
      default: once
      supports: [once]
    variants:
      - id: indexes_duplicate_indexes_pg14_plus
        min_pg_version: 140000
        sql_file: indexes/duplicate_indexes.sql

  indexes.tables_without_pk_or_unique:
