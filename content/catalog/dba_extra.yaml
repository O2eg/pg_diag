    display:
      default_sort:
        column: rolsuper
        direction: desc
    collection:
      default: once
      supports: [once]
    variants:
      - id: cluster_roles_privileges_pg14_plus
        min_pg_version: 140000
        sql_file: cluster/roles_privileges.sql

  cluster.pending_restart_settings:
