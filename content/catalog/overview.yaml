queries:
  cluster.server_version:
    title: PostgreSQL Full Version
    group: Overview
    main_view: pg_catalog
    description: Full PostgreSQL server version string.
    result_shape: scalar_text
    display:
      default_sort:
        column: version
        direction: asc
    collection:
      default: once
      supports: [once]
    variants:
      - id: cluster_server_version_all
        min_pg_version: 90400
        sql_file: cluster/server_version.sql

  cluster.settings:
    title: PostgreSQL Settings
    group: Overview
    main_view: pg_settings
    description: Runtime settings with display-friendly values where possible.
    source: postgresai
    display:
      default_sort:
        column: setting_name
        direction: asc
    evaluation:
      summary_title: PostgreSQL settings require review
      recommendation: Review pending-restart settings and validate work_mem against concurrency and query spill evidence before changing it globally.
    collection:
      default: once
      supports: [once]
    variants:
      - id: cluster_settings_all
        min_pg_version: 90400
        sql_file: cluster/settings.sql

  cluster.stat_reset_times:
    title: Statistics Reset Times
    group: Overview
    main_view: pg_stat_database
    description: Statistics reset timestamps and elapsed time since reset for PostgreSQL statistics views that expose stats_reset.
    source: PostgreSQL docs
    display:
      default_sort:
        column: seconds_since_reset
        direction: asc
    collection:
      default: once
      supports: [once, every_snapshot]
    variants:
      - id: cluster_stat_reset_times_pg14
        min_pg_version: 140000
        max_pg_version: 149999
        sql_file: cluster/stat_reset_times_pg14.sql
      - id: cluster_stat_reset_times_pg15
        min_pg_version: 150000
        max_pg_version: 159999
        sql_file: cluster/stat_reset_times_pg15.sql
      - id: cluster_stat_reset_times_pg16
        min_pg_version: 160000
        max_pg_version: 169999
        sql_file: cluster/stat_reset_times_pg16.sql
      - id: cluster_stat_reset_times_pg17_plus
        min_pg_version: 170000
        sql_file: cluster/stat_reset_times_pg17_plus.sql
