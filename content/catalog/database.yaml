semantic_profiles:
  database_workload_counters: &database_workload_counters
    dimensions:
      database: datname
    counters:
      xact_commit: xact_commit
      xact_rollback: xact_rollback
      blks_read: blks_read
      blks_hit: blks_hit
      tup_returned: tup_returned
      tup_fetched: tup_fetched
      tup_inserted: tup_inserted
      tup_updated: tup_updated
      tup_deleted: tup_deleted
      temp_files: temp_files
      temp_bytes: temp_bytes
      deadlocks: deadlocks
      blk_read_time: blk_read_time
      blk_write_time: blk_write_time
    gauges:
      numbackends: numbackends
      in_recovery: in_recovery_int
      invalid_indexes: invalid_indexes

queries:
  database.database_stats:
    title: Current Database Statistics
    group: Database Workload
    main_view: pg_stat_database
    description: Per-current-database cumulative workload counters.
    source: postgresai
    display:
      default_sort:
        column: xact_commit
        direction: desc
    collection:
      default: every_snapshot
      supports: [once, every_snapshot]
    variants:
      - id: database_stats_pg11
        min_pg_version: 110000
        max_pg_version: 119999
        sql_file: database/database_stats_pg11.sql
        semantic_columns: *database_workload_counters
      - id: database_stats_pg12_pg13
        min_pg_version: 120000
        max_pg_version: 139999
        sql_file: database/database_stats_pg12_pg13.sql
        semantic_columns: *database_workload_counters
      - id: database_stats_pg14
        min_pg_version: 140000
        max_pg_version: 149999
        sql_file: database/database_stats_pg14.sql
        semantic_columns: *database_workload_counters
      - id: database_stats_pg15_plus
        min_pg_version: 150000
        sql_file: database/database_stats_pg15_plus.sql
        semantic_columns: *database_workload_counters
