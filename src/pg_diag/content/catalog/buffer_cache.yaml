queries:
  buffer_cache.utilization:
    title: Buffer Cache Utilization Chart Source
    database_scope: all_databases
    group: Buffer Cache
    main_view: pg_buffercache
    cost: high
    description: Used and unused shared buffers, using the cheaper summary function on PostgreSQL 16+.
    display: {default_sort: {column: used_blocks, direction: desc}}
    collection: {default: every_snapshot, supports: [once, every_snapshot]}
    variants:
      - id: buffer_cache_utilization_pg10_pg15
        min_pg_version: 100000
        max_pg_version: 159999
        sql_file: buffer_cache/utilization.sql
        semantic_columns:
          dimensions: {scope: scope}
          gauges: {used_blocks: used_blocks, unused_blocks: unused_blocks}
      - id: buffer_cache_utilization_pg16_plus
        min_pg_version: 160000
        sql_file: buffer_cache/utilization_pg16_plus.sql
        semantic_columns:
          dimensions: {scope: scope}
          gauges: {used_blocks: used_blocks, unused_blocks: unused_blocks}

  buffer_cache.usage_count_distribution:
    title: Buffer Usage Count Distribution Chart Source
    database_scope: all_databases
    group: Buffer Cache
    main_view: pg_buffercache
    cost: high
    description: Shared-buffer counts grouped by usage count, using cheaper aggregate functions on PostgreSQL 16+.
    display: {default_sort: {column: usage_count_label, direction: asc}}
    collection: {default: every_snapshot, supports: [once, every_snapshot]}
    variants:
      - id: buffer_cache_usage_count_distribution_pg10_pg15
        min_pg_version: 100000
        max_pg_version: 159999
        sql_file: buffer_cache/usage_count_distribution.sql
        semantic_columns:
          dimensions: {usage_count: usage_count_label}
          gauges: {buffers: buffers}
      - id: buffer_cache_usage_count_distribution_pg16_plus
        min_pg_version: 160000
        sql_file: buffer_cache/usage_count_distribution_pg16_plus.sql
        semantic_columns:
          dimensions: {usage_count: usage_count_label}
          gauges: {buffers: buffers}

  buffer_cache.dirty_and_pinned:
    title: Dirty And Pinned Buffers Chart Source
    database_scope: all_databases
    group: Buffer Cache
    main_view: pg_buffercache
    cost: high
    description: Dirty and pinned shared-buffer gauges, using the cheaper summary function on PostgreSQL 16+.
    display: {default_sort: {column: dirty_blocks, direction: desc}}
    collection: {default: every_snapshot, supports: [once, every_snapshot]}
    variants:
      - id: buffer_cache_dirty_and_pinned_pg10_pg15
        min_pg_version: 100000
        max_pg_version: 159999
        sql_file: buffer_cache/dirty_and_pinned.sql
        semantic_columns:
          dimensions: {scope: scope}
          gauges: {dirty_blocks: dirty_blocks, pinned_blocks: pinned_blocks}
      - id: buffer_cache_dirty_and_pinned_pg16_plus
        min_pg_version: 160000
        sql_file: buffer_cache/dirty_and_pinned_pg16_plus.sql
        semantic_columns:
          dimensions: {scope: scope}
          gauges: {dirty_blocks: dirty_blocks, pinned_blocks: pinned_blocks}

  buffer_cache.by_database:
    title: Buffer Cache By Database Chart Source
    database_scope: all_databases
    group: Buffer Cache
    main_view: pg_buffercache
    cost: high
    description: Cached shared buffers grouped by database, including shared catalogs.
    display: {default_sort: {column: cached_blocks, direction: desc}}
    collection: {default: every_snapshot, supports: [once, every_snapshot]}
    variants:
      - id: buffer_cache_by_database_pg14_plus
        min_pg_version: 100000
        sql_file: buffer_cache/by_database.sql
        semantic_columns:
          dimensions: {database: database_name}
          gauges: {cached_blocks: cached_blocks}

  buffer_cache.top_relations:
    title: Top Relations In Buffer Cache Chart Source
    database_scope: current_database
    group: Buffer Cache
    main_view: pg_buffercache
    cost: high
    description: Top current-database relations by cached blocks, with a bounded Other bucket.
    display: {default_sort: {column: cached_blocks, direction: desc}}
    collection: {default: every_snapshot, supports: [once, every_snapshot]}
    variants:
      - id: buffer_cache_top_relations_pg14_plus
        min_pg_version: 100000
        sql_file: buffer_cache/top_relations.sql
        semantic_columns:
          dimensions: {relation: relation_name}
          gauges: {cached_blocks: cached_blocks}

  buffer_cache.top_dirty_relations:
    title: Top Dirty Relations In Buffer Cache Chart Source
    database_scope: current_database
    group: Buffer Cache
    main_view: pg_buffercache
    cost: high
    description: Top current-database relations by dirty cached blocks, with a bounded Other bucket.
    display: {default_sort: {column: dirty_blocks, direction: desc}}
    collection: {default: every_snapshot, supports: [once, every_snapshot]}
    variants:
      - id: buffer_cache_top_dirty_relations_pg14_plus
        min_pg_version: 100000
        sql_file: buffer_cache/top_dirty_relations.sql
        semantic_columns:
          dimensions: {relation: relation_name}
          gauges: {dirty_blocks: dirty_blocks}
