queries:
  activity.connection_pressure:
    title: Connection Pressure
    group: Activity & Locks
    main_view: pg_stat_activity
    description: Current connection usage compared with max_connections and reserved connection slots.
    source: queries_collection/pg_stat_activity_alert_max_connections_usage_db_converter.md
    display:
      default_sort:
        column: used_pct
        direction: desc
    evaluation:
      summary_title: Client connection capacity is nearly exhausted
      recommendation: Reduce application pool demand or connection leaks before raising max_connections; preserve reserved administrative access.
    collection:
      default: once
      supports: [once]
    variants:
      - id: activity_connection_pressure_pg14_plus
        min_pg_version: 100000
        sql_file: activity/connection_pressure.sql

  activity.wait_events:
    title: Active Wait Events
    database_scope: all_databases
    group: Activity & Locks
    main_view: pg_stat_activity
    description: Active processes grouped by database, application, wait event, query_id, and query text.
    source: queries_collection/pg_stat_activity_wait_events.md
    display:
      default_sort:
        column: sessions
        direction: desc
    collection:
      default: once
      supports: [once, every_snapshot]
    variants:
      - id: activity_wait_events_pg10_pg13
        min_pg_version: 100000
        max_pg_version: 139999
        sql_file: activity/wait_events_pg10_pg13.sql
        semantic_columns:
          dimensions:
            database: datname
            application: application_name
            wait_event_type: wait_event_type
            wait_event: wait_event
            query_id: query_id
            query: query
          gauges:
            sessions: sessions
      - id: activity_wait_events_pg14_plus
        min_pg_version: 140000
        sql_file: activity/wait_events.sql
        semantic_columns:
          dimensions:
            database: datname
            application: application_name
            wait_event_type: wait_event_type
            wait_event: wait_event
            query_id: query_id
            query: query
          gauges:
            sessions: sessions

  activity.long_transactions:
    title: Transactions Over 1 Minute
    database_scope: all_databases
    group: Activity & Locks
    main_view: pg_stat_activity
    description: Active and idle-in-transaction client sessions with transactions open for more than one minute.
    source: queries_collection/pg_stat_activity_dba_long_queries_db_converter.md
    cost: medium
    display:
      default_sort:
        column: xact_age_seconds
        direction: desc
    evaluation:
      summary_title: Long transactions require review
      recommendation: Confirm the workload owner and blocking or xmin impact before cancelling a backend; correct transaction boundaries and timeouts at the application layer.
    collection:
      default: once
      supports: [once, every_snapshot]
    variants:
      - id: activity_long_transactions_pg10_pg13
        min_pg_version: 100000
        max_pg_version: 139999
        sql_file: activity/long_transactions_pg10_pg13.sql
      - id: activity_long_transactions_pg14_plus
        min_pg_version: 140000
        sql_file: activity/long_transactions.sql

  activity.idle_in_transaction:
    title: Idle In Transaction Over 1 Minute
    database_scope: all_databases
    group: Activity & Locks
    main_view: pg_stat_activity
    description: Sessions stuck idle in transaction for more than one minute.
    source: queries_collection/pg_stat_activity_pg_stuck_idle_in_transaction.md
    display:
      default_sort:
        column: idle_seconds
        direction: desc
    evaluation:
      summary_title: Sessions are idle in open transactions
      recommendation: Confirm the owner before termination, then fix missing commit or rollback paths and consider idle_in_transaction_session_timeout.
    collection:
      default: once
      supports: [once, every_snapshot]
    variants:
      - id: activity_idle_in_transaction_pg14_plus
        min_pg_version: 100000
        sql_file: activity/idle_in_transaction.sql

  locks.lock_modes:
    title: Lock Mode Counts
    database_scope: current_database
    group: Activity & Locks
    main_view: pg_locks
    description: Current lock counts by type, mode, and granted state for the connected database and its sessions.
    source: queries_collection/pg_locks_locks_mode.md
    display:
      default_sort:
        column: locks
        direction: desc
    evaluation:
      summary_title: Lock requests are waiting
      recommendation: Use Lock Waits to identify exact blocker chains before cancelling or terminating any backend.
    collection:
      default: once
      supports: [once, every_snapshot]
    variants:
      - id: locks_lock_modes_pg14_plus
        min_pg_version: 100000
        sql_file: locks/lock_modes.sql

  replication.slots:
    title: Replication Slots
    group: Replication
    main_view: pg_replication_slots
    description: Physical and logical replication slots with retained WAL and xmin horizon impact.
    source: queries_collection/pg_replication_slots_replication_slots.md
    display:
      default_sort:
        column: retained_wal_bytes
        direction: desc
    evaluation:
      summary_title: A replication slot is no longer usable
      recommendation: Confirm the consumer state and rebuild or drop the slot only through the owning replication workflow.
    collection:
      default: once
      supports: [once, every_snapshot]
    variants:
      - id: replication_slots_pg10_pg12
        min_pg_version: 100000
        max_pg_version: 129999
        sql_file: replication/replication_slots_pg10_pg12.sql
        column_statuses:
          wal_status: {status: unsupported, reason: Replication slot WAL status is available from PostgreSQL 13.}
          safe_wal_size_bytes: {status: unsupported, reason: Replication slot safe WAL size is available from PostgreSQL 13.}
          inactive_since: {status: unsupported, reason: Replication slot inactive_since is available from PostgreSQL 17.}
          invalidation_reason: {status: unsupported, reason: Replication slot invalidation_reason is available from PostgreSQL 17.}
          two_phase: {status: unsupported, reason: Two-phase logical decoding slot metadata is available from PostgreSQL 14.}
          failover: {status: unsupported, reason: Failover slot metadata is available from PostgreSQL 17.}
          synced: {status: unsupported, reason: Standby slot synchronization metadata is available from PostgreSQL 17.}
          conflicting: {status: unsupported, reason: Replication slot conflicting is available from PostgreSQL 16.}
      - id: replication_slots_pg13
        min_pg_version: 130000
        max_pg_version: 139999
        sql_file: replication/replication_slots_pg13.sql
        column_statuses:
          inactive_since: {status: unsupported, reason: Replication slot inactive_since is available from PostgreSQL 17.}
          invalidation_reason: {status: unsupported, reason: Replication slot invalidation_reason is available from PostgreSQL 17.}
          two_phase: {status: unsupported, reason: Two-phase logical decoding slot metadata is available from PostgreSQL 14.}
          failover: {status: unsupported, reason: Failover slot metadata is available from PostgreSQL 17.}
          synced: {status: unsupported, reason: Standby slot synchronization metadata is available from PostgreSQL 17.}
          conflicting: {status: unsupported, reason: Replication slot conflicting is available from PostgreSQL 16.}
      - id: replication_slots_pg14_pg15
        min_pg_version: 140000
        max_pg_version: 159999
        sql_file: replication/replication_slots_pg14_pg15.sql
        column_statuses:
          inactive_since: {status: unsupported, reason: Replication slot inactive_since is available from PostgreSQL 17.}
          invalidation_reason: {status: unsupported, reason: Replication slot invalidation_reason is available from PostgreSQL 17.}
          failover: {status: unsupported, reason: Failover slot metadata is available from PostgreSQL 17.}
          synced: {status: unsupported, reason: Standby slot synchronization metadata is available from PostgreSQL 17.}
          conflicting: {status: unsupported, reason: Replication slot conflicting is available from PostgreSQL 16.}
      - id: replication_slots_pg16
        min_pg_version: 160000
        max_pg_version: 169999
        sql_file: replication/replication_slots_pg16.sql
        column_statuses:
          inactive_since: {status: unsupported, reason: Replication slot inactive_since is available from PostgreSQL 17.}
          invalidation_reason: {status: unsupported, reason: Replication slot invalidation_reason is available from PostgreSQL 17.}
          failover: {status: unsupported, reason: Failover slot metadata is available from PostgreSQL 17.}
          synced: {status: unsupported, reason: Standby slot synchronization metadata is available from PostgreSQL 17.}
      - id: replication_slots_pg17_plus
        min_pg_version: 170000
        sql_file: replication/replication_slots_pg17_plus.sql

  wal.stat_wal:
    title: WAL Statistics
    group: WAL, I/O & Checkpoints
    main_view: pg_stat_wal
    description: Cumulative WAL counters including bytes, records, writes, syncs, and buffers full.
    display:
      default_sort:
        column: wal_bytes
        direction: desc
    collection:
      default: once
      supports: [once, every_snapshot]
    requirements:
      unsupported_versions_reason: pg_stat_wal exists only from PostgreSQL 14.
    variants:
      - id: wal_stat_wal_pg14_pg17
        min_pg_version: 140000
        max_pg_version: 179999
        sql_file: wal/stat_wal_pg14_pg17.sql
      - id: wal_stat_wal_pg18_plus
        min_pg_version: 180000
        sql_file: wal/stat_wal.sql

  wal.archiver:
    title: WAL Archiver
    group: WAL, I/O & Checkpoints
    main_view: pg_stat_archiver
    description: Archiver success/failure counters and approximate pending WAL segment count.
    source: queries_collection/pg_stat_archiver_pg_archiver.md
    display:
      default_sort:
        column: segments_ahead_of_last_archived_same_timeline
        direction: desc
    evaluation:
      summary_title: WAL archiving requires review
      recommendation: Check PostgreSQL archiver logs and archive target health before changing or retrying archive configuration.
    collection:
      default: once
      supports: [once, every_snapshot]
    variants:
      - id: wal_archiver_pg14_plus
        min_pg_version: 100000
        sql_file: wal/archiver.sql

  slru.stat_slru:
    title: SLRU Statistics
    group: WAL, I/O & Checkpoints
    main_view: pg_stat_slru
    description: SLRU cache read/write, flush, and truncation counters.
    source: queries_collection/pg_stat_slru_pg_stat_slru.md
    display:
      default_sort:
        column: blks_read
        direction: desc
    collection:
      default: once
      supports: [once, every_snapshot]
    requirements:
      unsupported_versions_reason: pg_stat_slru exists only from PostgreSQL 13.
    variants:
      - id: slru_stat_slru_pg14_plus
        min_pg_version: 130000
        sql_file: slru/stat_slru.sql

  vacuum.database_wraparound:
    title: Database Wraparound Age
    database_scope: all_databases
    group: Storage & Vacuum
    main_view: pg_database
    description: Transaction ID and multixact age for databases relative to autovacuum freeze limits.
    source: queries_collection/pg_database_pg_database_wraparound.md
    display:
      default_sort:
        column: xid_age
        direction: desc
    evaluation:
      summary_title: Database freeze age requires attention
      recommendation: Identify horizon blockers and ensure vacuum progresses before age reaches transaction or multixact safety limits.
    collection:
      default: once
      supports: [once]
    variants:
      - id: vacuum_database_wraparound_pg10_pg13
        min_pg_version: 100000
        max_pg_version: 139999
        sql_file: vacuum/database_wraparound_pg10_pg13.sql
      - id: vacuum_database_wraparound_pg14_plus
        min_pg_version: 140000
        sql_file: vacuum/database_wraparound.sql

  vacuum.xmin_horizon:
    title: Xmin Horizon Summary
    group: Storage & Vacuum
    main_view: pg_stat_activity
    description: Oldest data and catalog xmin horizons split by activity, slots, replication, and prepared transactions.
    source: queries_collection/pg_stat_activity_xmin_horizon.md
    display:
      default_sort:
        column: catalog_horizon_age_tx
        direction: desc
    collection:
      default: once
      supports: [once]
    variants:
      - id: vacuum_xmin_horizon_pg14_plus
        min_pg_version: 100000
        sql_file: vacuum/xmin_horizon.sql

  vacuum.xmin_horizon_blockers:
    title: Xmin Horizon Blockers
    group: Storage & Vacuum
    main_view: pg_stat_activity
    description: "Top xmin horizon blocker per component: activity, replication slots, standby feedback, and prepared xacts."
    source: queries_collection/pg_stat_activity_xmin_horizon_blockers.md
    display:
      default_sort:
        column: age_tx
        direction: desc
    collection:
      default: once
      supports: [once]
    variants:
      - id: vacuum_xmin_horizon_blockers_pg14_plus
        min_pg_version: 100000
        sql_file: vacuum/xmin_horizon_blockers.sql

  vacuum.prepared_xacts:
    title: Prepared Transactions
    group: Storage & Vacuum
    main_view: pg_prepared_xacts
    description: Two-phase commit transactions that can retain old XIDs and locks.
    source: queries_collection/pg_prepared_xacts_ccp_prepared_xacts_pg_pgexporter_conf.md
    display:
      default_sort:
        column: prepared_age_seconds
        direction: desc
    collection:
      default: once
      supports: [once]
    variants:
      - id: vacuum_prepared_xacts_pg14_plus
        min_pg_version: 100000
        sql_file: vacuum/prepared_xacts.sql

  progress.vacuum:
    title: Vacuum Progress
    database_scope: current_database
    group: Maintenance Progress
    main_view: pg_stat_progress_vacuum
    description: Running VACUUM and autovacuum operations with heap/index progress.
    source: queries_collection/pg_stat_progress_vacuum_pg_vacuum_progress.md
    display:
      default_sort:
        column: query_age_seconds
        direction: desc
    collection:
      default: once
      supports: [once]
    variants:
      - id: progress_vacuum_pg14_pg16
        min_pg_version: 100000
        max_pg_version: 169999
        sql_file: progress/vacuum_progress_pg14_pg16.sql
      - id: progress_vacuum_pg17_plus
        min_pg_version: 170000
        sql_file: progress/vacuum_progress_pg17_plus.sql

  progress.create_index:
    title: Create Index Progress
    database_scope: current_database
    group: Maintenance Progress
    main_view: pg_stat_progress_create_index
    description: Running CREATE INDEX and REINDEX operations.
    display:
      default_sort:
        column: query_age_seconds
        direction: desc
    collection:
      default: once
      supports: [once]
    requirements:
      unsupported_versions_reason: pg_stat_progress_create_index exists only from PostgreSQL 12.
    variants:
      - id: progress_create_index_pg14_plus
        min_pg_version: 120000
        sql_file: progress/create_index_progress.sql

  progress.cluster:
    title: Cluster Progress
    database_scope: current_database
    group: Maintenance Progress
    main_view: pg_stat_progress_cluster
    description: Running CLUSTER and VACUUM FULL operations.
    display:
      default_sort:
