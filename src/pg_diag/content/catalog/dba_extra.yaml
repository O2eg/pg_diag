      default: once
      supports: [once]
    requirements:
      unsupported_versions_reason: pg_stat_progress_cluster exists only from PostgreSQL 12.
    variants:
      - id: progress_cluster_pg14_plus
        min_pg_version: 120000
        sql_file: progress/cluster_progress.sql

  progress.copy:
    title: Copy Progress
    database_scope: current_database
    group: Maintenance Progress
    main_view: pg_stat_progress_copy
    description: Running COPY operations with byte and tuple progress.
    display:
      default_sort:
        column: query_age_seconds
        direction: desc
    collection:
      default: once
      supports: [once]
    requirements:
      unsupported_versions_reason: pg_stat_progress_copy exists only from PostgreSQL 14.
    variants:
      - id: progress_copy_pg14_plus
        min_pg_version: 140000
        sql_file: progress/copy_progress.sql

  storage.sequence_status:
    title: Sequence Exhaustion
    database_scope: current_database
    group: Storage & Vacuum
    main_view: pg_sequences
    description: Sequence usage, capacity, and related tables to detect approaching exhaustion.
    source: queries_collection/pg_sequences_helper_monitor_sequence_status_pg_pgexporter_conf.md
    cost: medium
    display:
      default_sort:
        column: percent
        direction: desc
    evaluation:
      summary_title: Non-cycling sequences are approaching exhaustion
      recommendation: Validate application ID width and plan a sequence/type range change before remaining values are consumed.
    collection:
      default: once
      supports: [once]
    variants:
      - id: storage_sequence_status_pg14_plus
        min_pg_version: 100000
        sql_file: storage/sequence_status.sql

  indexes.redundant_indexes:
    title: Redundant Indexes
    database_scope: current_database
    group: Index Health
    main_view: pg_index
    description: Indexes covered by another index on the same relation.
    source: queries_collection/pg_index_redundant_indexes_pg_utils.md
    cost: medium
    display:
      default_sort:
        column: redundant_index_size_bytes
        direction: desc
    evaluation:
      summary_title: Structurally overlapping indexes require baseline review
      recommendation: Treat rows as candidates only; compare plans, constraints, INCLUDE columns, workload, and DDL dependencies before removal.
    collection:
      default: once
      supports: [once]
    variants:
      - id: indexes_redundant_indexes_pg10
        min_pg_version: 100000
        max_pg_version: 109999
        sql_file: indexes/redundant_indexes_pg10.sql
      - id: indexes_redundant_indexes_pg11_plus
        min_pg_version: 110000
        sql_file: indexes/redundant_indexes.sql

  indexes.foreign_keys_without_index:
    title: Foreign Keys Without Supporting Index
    database_scope: current_database
    group: Index Health
    main_view: pg_constraint
    description: Foreign keys whose referencing columns are not the leftmost prefix of a valid index.
    source: queries_collection/pg_constraint_dba_foreign_keys_without_index_db_converter.md
    cost: medium
    display:
      default_sort:
        column: source_n_live_tup
        direction: desc
    evaluation:
      summary_title: Large foreign-key tables lack a supporting left-prefix index
      recommendation: Prioritize parent UPDATE/DELETE paths and validate the suggested key order before creating an index.
    collection:
      default: once
      supports: [once]
    variants:
      - id: indexes_foreign_keys_without_index_pg14_plus
        min_pg_version: 100000
        sql_file: indexes/foreign_keys_without_index.sql

  indexes.duplicate_indexes:
    title: Duplicate Indexes
    database_scope: current_database
    group: Index Health
    main_view: pg_index
    description: Indexes with identical key/operator/collation/predicate/expression fingerprints.
    source: queries_collection/pg_index_dba_duplicate_indexes_db_converter.md
    cost: medium
    display:
      default_sort:
        column: total_index_size_bytes
        direction: desc
    evaluation:
      summary_title: Structurally duplicate indexes were found
      recommendation: Confirm constraint and extension dependencies, keep the required valid index, and remove only verified duplicates.
    collection:
      default: once
      supports: [once]
    variants:
      - id: indexes_duplicate_indexes_pg10
        min_pg_version: 100000
        max_pg_version: 109999
        sql_file: indexes/duplicate_indexes_pg10.sql
      - id: indexes_duplicate_indexes_pg11_plus
        min_pg_version: 110000
        sql_file: indexes/duplicate_indexes.sql

  indexes.tables_without_pk_or_unique:
    title: Tables Without PK Or Unique Index
    database_scope: current_database
    group: Index Health
    main_view: pg_class
    description: User tables without a primary key or any valid unique index.
    source: queries_collection/pg_index_dba_tables_without_pk_or_unique_db_converter.md
    cost: medium
    display:
      default_sort:
        column: total_relation_size_bytes
        direction: desc
    evaluation:
      summary_title: Large tables lack a primary or non-partial unique index
      recommendation: Confirm table lifecycle and row-identity requirements before adding a key or unique constraint.
    collection:
      default: once
      supports: [once]
    variants:
      - id: indexes_tables_without_pk_or_unique_pg14_plus
        min_pg_version: 100000
        sql_file: indexes/tables_without_pk_or_unique.sql

  indexes.large_indexes:
    title: Indexes Large Relative To Table
    database_scope: current_database
    group: Index Health
    main_view: pg_index
    description: Indexes larger than half of the table heap, with usage counters.
    source: queries_collection/pg_index_dba_idx_large_relative_to_table_db_converter.md
    cost: medium
    display:
      default_sort:
        column: index_to_table_pct
        direction: desc
    collection:
      default: once
      supports: [once]
    variants:
