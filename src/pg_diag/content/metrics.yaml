    display:
      default_sort: {column: total_plan_time_ms_delta, direction: desc}
    table:
      key_refs: [dimensions.database_id, dimensions.user_id, dimensions.query_id, dimensions.toplevel]
      epoch_refs: [dimensions.global_stats_reset, dimensions.entry_stats_since]
      limit: 50
      sort: {column: total_plan_time_ms_delta, direction: desc}
      columns:
        - {name: datname, value_ref: dimensions.database, transform: last, pg_type: text}
        - {name: rolname, value_ref: dimensions.user, transform: last, pg_type: text}
        - {name: track_planning, value_ref: dimensions.track_planning, transform: last, pg_type: text}
        - {name: dbid, role: key, key_index: 0, pg_type: oid}
        - {name: userid, role: key, key_index: 1, pg_type: oid}
        - {name: query_id, role: key, key_index: 2, pg_type: int8}
        - {name: toplevel, role: key, key_index: 3, pg_type: bool}
        - {name: plans_delta, value_ref: counters.plans, transform: delta, pg_type: float8}
        - {name: plans_per_sec, value_ref: counters.plans, transform: rate, pg_type: float8}
