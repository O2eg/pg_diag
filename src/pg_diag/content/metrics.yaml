  wal.archiver_delta:
    title: WAL Archiver Delta
    database_scope: all_databases
    source_query: metrics.wal_archiver_delta
    requires_collection: window_endpoints
    result: table
    display:
      default_sort: {column: archived_count_delta, direction: desc}
    evaluation:
      summary_title: WAL archive attempts failed during the snapshot window
      recommendation: Inspect PostgreSQL archiver logs and archive target health before retrying or changing archive configuration.
      rules:
        - severity: medium
          reason: One or more WAL archive attempts failed during the snapshot window
          all: [{column: failed_count_delta, operator: gt, value: 0}]
    table:
      key_refs: [dimensions.scope]
      epoch_refs: [dimensions.stats_reset]
      drop_zero_rows: false
      sort: {column: archived_count_delta, direction: desc}
      columns:
        - {name: scope, role: key, key_index: 0, pg_type: text}
        - {name: archived_count_delta, value_ref: counters.archived_count, transform: delta, pg_type: float8}
        - {name: archived_per_sec, value_ref: counters.archived_count, transform: rate, pg_type: float8}
        - {name: failed_count_delta, value_ref: counters.failed_count, transform: delta, pg_type: float8}
        - {name: last_archived_wal, value_ref: dimensions.last_archived_wal, transform: last, pg_type: text}
        - {name: last_failed_wal, value_ref: dimensions.last_failed_wal, transform: last, pg_type: text}

  replication.logical_slot_delta:
    title: Logical Decoding Slot Delta
    database_scope: all_databases
    source_query: metrics.logical_decoding_slot_delta
    requires_collection: window_endpoints
    result: table
    display:
      default_sort: {column: spill_bytes_delta, direction: desc}
    table:
      key_refs: [dimensions.slot_name]
      epoch_refs: [dimensions.stats_reset]
      limit: 50
      sort: {column: spill_bytes_delta, direction: desc}
      columns:
        - {name: slot_name, role: key, key_index: 0, pg_type: text}
        - {name: spill_txns_delta, value_ref: counters.spill_txns, transform: delta, pg_type: float8}
