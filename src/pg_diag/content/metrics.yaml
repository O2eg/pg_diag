  checkpoints.bgwriter_delta:
    title: Background Writer Delta
    database_scope: all_databases
    source_query: metrics.bgwriter_delta
    requires_collection: window_endpoints
    result: table
    display:
      default_sort: {column: buffers_clean_delta, direction: desc}
    evaluation:
      summary_title: Client backends performed fsync operations
      recommendation: Review checkpoint and storage behavior before changing buffer or writer settings.
      rules:
        - severity: medium
          reason: Client backends performed their own fsync operations during the snapshot window
          all: [{column: buffers_backend_fsync_delta, operator: gt, value: 0}]
    table:
      key_refs: [dimensions.scope]
      epoch_refs: [dimensions.stats_reset]
      drop_zero_rows: false
      sort: {column: buffers_clean_delta, direction: desc}
      columns:
        - {name: scope, role: key, key_index: 0, pg_type: text}
        - {name: buffers_clean_delta, value_ref: counters.buffers_clean, transform: delta, pg_type: float8}
        - {name: maxwritten_clean_delta, value_ref: counters.maxwritten_clean, transform: delta, pg_type: float8}
        - {name: buffers_backend_delta, value_ref: counters.buffers_backend, transform: delta, pg_type: float8}
        - {name: buffers_backend_fsync_delta, value_ref: counters.buffers_backend_fsync, transform: delta, pg_type: float8}
        - {name: buffers_alloc_delta, value_ref: counters.buffers_alloc, transform: delta, pg_type: float8}

