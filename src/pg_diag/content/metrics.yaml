metric_catalog:
  schema_version: 4
  defaults:
    mode: snapshots
    x: snapshot_time

sampler_providers:
  linux_os:
    module: pg_diag.providers.linux
    function: collect_linux_os
    grace_timeout_ms: 1000
    config:
      proc_script: samplers/linux_proc.sh
      iostat_script: samplers/linux_iostat.sh
      cpu_output: os.cpu
      memory_output: os.memory
      disk_output: os.disk
      network_output: os.network
    outputs:
      os.cpu:
        collection_scope: every_snapshot
        source_file: samplers/linux_proc.sh
        source_language: bash
      os.memory:
        collection_scope: every_snapshot
        source_file: samplers/linux_proc.sh
        source_language: bash
      os.disk:
        collection_scope: every_snapshot
        source_file: samplers/linux_iostat.sh
        source_language: bash
      os.network:
        collection_scope: every_snapshot
        source_file: samplers/linux_proc.sh
        source_language: bash
  postgresql_backend_proc:
    module: pg_diag.providers.linux
    function: collect_postgresql_backend_proc
    grace_timeout_ms: 1000
    config:
      proc_script: samplers/postgresql_backend_proc.sh
      output: os.backend_proc
    outputs:
      os.backend_proc:
        collection_scope: window_endpoints
        source_file: samplers/postgresql_backend_proc.sh
        source_language: bash

metrics:
  os.cpu_utilization:
    title: CPU Utilization
    source_sampler: os.cpu
    series:
      - name: user
        value_ref: user_pct
        transform: gauge
        unit: "%"
        color: "#93d083"
      - name: system
        value_ref: system_pct
        transform: gauge
        unit: "%"
        color: "#e98996"
      - name: iowait
        value_ref: iowait_pct
        transform: gauge
        unit: "%"
        color: "#efd05f"
      - name: steal
        value_ref: steal_pct
        transform: gauge
        unit: "%"
        color: "#e7a764"
      - name: idle
        value_ref: idle_pct
        transform: gauge
        unit: "%"
        color: "#aeb4bd"
    chart:
      kind: stacked_area
      series_order: configured
      unit: "%"

  os.cpu_load:
    title: CPU Load Average
    source_sampler: os.cpu
    series:
      - name: load1
        value_ref: load1
        transform: gauge
        unit: load
      - name: load5
        value_ref: load5
        transform: gauge
        unit: load
      - name: load15
        value_ref: load15
        transform: gauge
        unit: load
    chart:
      kind: line
      unit: load

  os.memory_usage:
    title: Memory Usage
    source_sampler: os.memory
    series:
      - name: Application memory
        value_ref: application_bytes
        transform: gauge
        unit: bytes
        color: "#93d083"
      - name: Page cache
        value_ref: cached_bytes
        transform: gauge
        unit: bytes
        color: "#b38ee8"
      - name: Shared memory
        value_ref: shared_bytes
        transform: gauge
        unit: bytes
        color: "#84c8e7"
      - name: Buffers
        value_ref: buffers_bytes
        transform: gauge
        unit: bytes
        color: "#e7a764"
      - name: Slab reclaimable
        value_ref: slab_reclaimable_bytes
        transform: gauge
        unit: bytes
        color: "#efd05f"
      - name: Slab unreclaimable
        value_ref: slab_unreclaimable_bytes
        transform: gauge
        unit: bytes
        color: "#d6b45d"
      - name: Page tables
        value_ref: page_tables_bytes
        transform: gauge
        unit: bytes
        color: "#8f9ae8"
      - name: Kernel stack
        value_ref: kernel_stack_bytes
        transform: gauge
        unit: bytes
        color: "#aeb4bd"
      - name: Swap cache
        value_ref: swap_cached_bytes
        transform: gauge
        unit: bytes
        color: "#e98996"
      - name: Free
        value_ref: free_bytes
        transform: gauge
        unit: bytes
        color: "#c9ea5f"
    chart:
      kind: stacked_area
      series_order: configured
      unit: bytes

  os.memory_pressure:
    title: RAM And Swap Usage
    source_sampler: os.memory
    series:
      - name: RAM used
        value_ref: used_pct
        transform: gauge
        unit: "%"
      - name: swap used
        value_ref: swap_used_pct
        transform: gauge
        unit: "%"
    chart:
      kind: line
      unit: "%"

  os.disk_read_throughput:
    title: Disk Read Throughput
    source_sampler: os.disk
    partition_by:
      - device
    series:
      - name: read
        value_ref: read_bytes_per_sec
        transform: gauge
        unit: bytes/s
    chart:
      kind: area
      unit: bytes/s

  os.disk_write_throughput:
    title: Disk Write Throughput
    source_sampler: os.disk
    partition_by:
      - device
    series:
      - name: write
        value_ref: write_bytes_per_sec
        transform: gauge
        unit: bytes/s
    chart:
      kind: area
      unit: bytes/s

  os.disk_iops:
    title: Disk IOPS
    source_sampler: os.disk
    partition_by:
      - device
    series:
      - name: read iops
        value_ref: read_iops
        transform: gauge
        unit: iops
      - name: write iops
        value_ref: write_iops
        transform: gauge
        unit: iops
    chart:
      kind: stacked_area
      unit: iops

  os.disk_utilization:
    title: Disk Utilization
    source_sampler: os.disk
    partition_by:
      - device
    series:
      - name: util
        value_ref: util_pct
        transform: gauge
        unit: "%"
    chart:
      kind: area
      unit: "%"

  os.disk_latency:
    title: Disk Latency
    source_sampler: os.disk
    partition_by:
      - device
    series:
      - name: await
        value_ref: await_ms
        transform: gauge
        unit: ms
      - name: read await
        value_ref: r_await_ms
        transform: gauge
        unit: ms
      - name: write await
        value_ref: w_await_ms
        transform: gauge
        unit: ms
    chart:
      kind: line
      unit: ms

  os.network_receive_throughput:
    title: Network Receive Throughput
    source_sampler: os.network
    partition_by:
      - interface
    series:
      - name: rx
        value_ref: rx_bytes_per_sec
        transform: gauge
        unit: bytes/s
    chart:
      kind: area
      unit: bytes/s

  os.network_transmit_throughput:
    title: Network Transmit Throughput
    source_sampler: os.network
    partition_by:
      - interface
    series:
      - name: tx
        value_ref: tx_bytes_per_sec
        transform: gauge
        unit: bytes/s
    chart:
      kind: area
      unit: bytes/s

  os.network_packets:
    title: Network Packets
    source_sampler: os.network
    partition_by:
      - interface
    series:
      - name: rx packets
        value_ref: rx_packets_per_sec
        transform: gauge
        unit: packets/s
      - name: tx packets
        value_ref: tx_packets_per_sec
        transform: gauge
        unit: packets/s
    chart:
      kind: stacked_area
      unit: packets/s

  database.transaction_rate:
    title: Database Transaction Rate
    database_scope: all_databases
    source_query: metrics.database_transaction_rate
    requires_collection: every_snapshot
    partition_by:
      - dimensions.database
    series:
      - name: commits
        value_ref: counters.xact_commit
        transform: rate
        unit: tx/s
      - name: rollbacks
        value_ref: counters.xact_rollback
        transform: rate
        unit: tx/s
    chart:
      kind: stacked_area
      unit: tx/s

  activity.sessions_by_state:
    title: Sessions By State
    database_scope: all_databases
    source_query: metrics.activity_sessions_by_state
    requires_collection: every_snapshot
    partition_by:
      - dimensions.database
      - dimensions.state
    series:
      - name_from_ref: dimensions.state
        value_ref: gauges.sessions
        transform: gauge
        unit: sessions
    chart:
      kind: stacked_area
      unit: sessions

  wal.growth_rate:
    title: WAL Growth Rate
    source_query: metrics.wal_growth_rate
    requires_collection: every_snapshot
    partition_by:
      - dimensions.scope
    series:
      - name: wal bytes
        value_ref: counters.wal_bytes
        transform: rate
        unit: bytes/s
    chart:
      kind: area
      unit: bytes/s

  io.read_write_rate:
    title: I/O Read And Write Rate
    source_query: metrics.io_read_write_rate
    requires_collection: every_snapshot
    partition_by:
      - dimensions.backend_type
    series:
      - name: read
        value_ref: counters.read_bytes
        transform: rate
        optional: true
        unit: bytes/s
      - name: write
        value_ref: counters.write_bytes
        transform: rate
        optional: true
        unit: bytes/s
    chart:
      kind: stacked_area
      unit: bytes/s

  database.tuple_dml_rate:
    title: Database Tuple DML Rate
    database_scope: all_databases
    source_query: metrics.database_tuple_dml_rate
    requires_collection: every_snapshot
    partition_by:
      - dimensions.database
    series:
      - name: inserts
        value_ref: counters.tup_inserted
        transform: rate
        unit: rows/s
      - name: updates
        value_ref: counters.tup_updated
        transform: rate
        unit: rows/s
      - name: deletes
        value_ref: counters.tup_deleted
        transform: rate
        unit: rows/s
    chart:
      kind: stacked_area
      unit: rows/s

  database.tuple_access_rate:
    title: Database Tuple Access Rate
    database_scope: all_databases
    source_query: metrics.database_tuple_access_rate
    requires_collection: every_snapshot
    partition_by:
      - dimensions.database
    series:
      - name: returned
        value_ref: counters.tup_returned
        transform: rate
        unit: tuples/s
      - name: fetched
        value_ref: counters.tup_fetched
        transform: rate
        unit: tuples/s
    chart:
      kind: line
      unit: tuples/s

  database.block_access_rate:
    title: Database Block Access Rate
    database_scope: all_databases
    source_query: metrics.database_block_access_rate
    requires_collection: every_snapshot
    partition_by:
      - dimensions.database
    series:
      - name: read
        value_ref: counters.blks_read
        transform: rate
        unit: blocks/s
      - name: hit
        value_ref: counters.blks_hit
        transform: rate
        unit: blocks/s
    chart:
      kind: stacked_area
      unit: blocks/s

  database.temp_files_delta:
    title: Database Temp Files Delta
    database_scope: all_databases
    source_query: metrics.database_temp_files_delta
    requires_collection: every_snapshot
    partition_by:
      - dimensions.database
    series:
      - name: temp files
        value_ref: counters.temp_files
        transform: delta
        unit: files
    chart:
      kind: column
      unit: files

  database.temp_bytes_rate:
    title: Database Temp Bytes Rate
    database_scope: all_databases
    source_query: metrics.database_temp_bytes_rate
    requires_collection: every_snapshot
    partition_by:
      - dimensions.database
    series:
      - name: temp bytes
        value_ref: counters.temp_bytes
        transform: rate
        unit: bytes/s
    chart:
      kind: area
      unit: bytes/s

  database.io_time_rate:
    title: Database I/O Time Rate
    database_scope: all_databases
    source_query: metrics.database_io_time_rate
    requires_collection: every_snapshot
    partition_by:
      - dimensions.database
    series:
      - name: read time
        value_ref: counters.blk_read_time
        transform: rate
        unit: ms/s
      - name: write time
        value_ref: counters.blk_write_time
        transform: rate
        unit: ms/s
    chart:
      kind: stacked_area
      unit: ms/s

  database.backends:
    title: Database Backends
    database_scope: all_databases
    source_query: metrics.database_backends
    requires_collection: every_snapshot
    partition_by:
      - dimensions.database
    series:
      - name: backends
        value_ref: gauges.numbackends
        transform: gauge
        unit: backends
    chart:
      kind: area
      unit: backends

  database.deadlocks:
    title: Database Deadlocks
    database_scope: all_databases
    source_query: metrics.database_deadlocks
    requires_collection: every_snapshot
    partition_by:
      - dimensions.database
    series:
      - name: deadlocks
        value_ref: counters.deadlocks
        transform: delta
        unit: deadlocks
    chart:
      kind: column
      unit: deadlocks

  objects.tables_top_tuple_access_rate:
    title: Top Tables By Tuple Access Rate
    database_scope: current_database
    source_query: metrics.objects_tables_top_tuple_access_rate
    requires_collection: every_snapshot
    top_n:
      mode: interval
      limit: 10
      key_refs: [dimensions.database, dimensions.relation_id]
      label_refs: [dimensions.schema, dimensions.table]
      value_refs: [counters.seq_tup_read, counters.idx_tup_fetch]
      transform: rate
      unit: tuples/s
    chart:
      kind: stacked_column
      unit: tuples/s

  objects.tables_top_seq_read_rate:
    title: Top Tables By Sequential Tuple Read Rate
    database_scope: current_database
    source_query: metrics.objects_tables_top_seq_read_rate
    requires_collection: every_snapshot
    top_n:
      mode: interval
      limit: 10
      key_refs: [dimensions.database, dimensions.relation_id]
      label_refs: [dimensions.schema, dimensions.table]
      value_ref: counters.seq_tup_read
      transform: rate
      unit: tuples/s
    chart:
      kind: stacked_column
      unit: tuples/s

  objects.tables_top_index_fetch_rate:
    title: Top Tables By Index Fetch Rate
    database_scope: current_database
    source_query: metrics.objects_tables_top_index_fetch_rate
    requires_collection: every_snapshot
    top_n:
      mode: interval
      limit: 10
      key_refs: [dimensions.database, dimensions.relation_id]
      label_refs: [dimensions.schema, dimensions.table]
      value_ref: counters.idx_tup_fetch
      transform: rate
      unit: tuples/s
    chart:
      kind: stacked_column
      unit: tuples/s

  objects.tables_top_dml_rate:
    title: Top Tables By DML Rate
    database_scope: current_database
    source_query: metrics.objects_tables_top_dml_rate
    requires_collection: every_snapshot
    top_n:
      mode: interval
      limit: 10
      key_refs: [dimensions.database, dimensions.relation_id]
      label_refs: [dimensions.schema, dimensions.table]
      value_refs: [counters.n_tup_ins, counters.n_tup_upd, counters.n_tup_del]
      transform: rate
      unit: rows/s
    chart:
      kind: stacked_column
      unit: rows/s

  objects.tables_top_insert_rate:
    title: Top Tables By Insert Rate
    database_scope: current_database
    source_query: metrics.objects_tables_top_insert_rate
    requires_collection: every_snapshot
    top_n:
      mode: interval
      limit: 10
      key_refs: [dimensions.database, dimensions.relation_id]
      label_refs: [dimensions.schema, dimensions.table]
      value_ref: counters.n_tup_ins
      transform: rate
      unit: rows/s
    chart:
      kind: stacked_column
      unit: rows/s

  objects.tables_top_update_rate:
    title: Top Tables By Update Rate
    database_scope: current_database
    source_query: metrics.objects_tables_top_update_rate
    requires_collection: every_snapshot
    top_n:
      mode: interval
      limit: 10
      key_refs: [dimensions.database, dimensions.relation_id]
      label_refs: [dimensions.schema, dimensions.table]
      value_ref: counters.n_tup_upd
      transform: rate
      unit: rows/s
    chart:
      kind: stacked_column
      unit: rows/s

  objects.tables_top_delete_rate:
    title: Top Tables By Delete Rate
    database_scope: current_database
    source_query: metrics.objects_tables_top_delete_rate
    requires_collection: every_snapshot
    top_n:
      mode: interval
      limit: 10
      key_refs: [dimensions.database, dimensions.relation_id]
      label_refs: [dimensions.schema, dimensions.table]
      value_ref: counters.n_tup_del
      transform: rate
      unit: rows/s
    chart:
      kind: stacked_column
      unit: rows/s

  objects.tables_top_hot_update_rate:
    title: Top Tables By HOT Update Rate
    database_scope: current_database
    source_query: metrics.objects_tables_top_hot_update_rate
    requires_collection: every_snapshot
    top_n:
      mode: interval
      limit: 10
      key_refs: [dimensions.database, dimensions.relation_id]
      label_refs: [dimensions.schema, dimensions.table]
      value_ref: counters.n_tup_hot_upd
      transform: rate
      unit: rows/s
    chart:
      kind: stacked_column
      unit: rows/s

  objects.tables_top_heap_read_rate:
    title: Top Tables By Heap Block Read Rate
    database_scope: current_database
    source_query: metrics.objects_tables_top_heap_read_rate
    requires_collection: every_snapshot
    top_n:
      mode: interval
      limit: 10
      key_refs: [dimensions.database, dimensions.relation_id]
      label_refs: [dimensions.schema, dimensions.table]
      value_ref: counters.heap_blks_read
      transform: rate
      unit: blocks/s
    chart:
      kind: stacked_column
      unit: blocks/s

  objects.tables_top_index_block_read_rate:
    title: Top Tables By Index Block Read Rate
    database_scope: current_database
    source_query: metrics.objects_tables_top_index_block_read_rate
    requires_collection: every_snapshot
    top_n:
      mode: interval
      limit: 10
      key_refs: [dimensions.database, dimensions.relation_id]
      label_refs: [dimensions.schema, dimensions.table]
      value_ref: counters.idx_blks_read
      transform: rate
      unit: blocks/s
    chart:
      kind: stacked_column
      unit: blocks/s

  objects.indexes_top_scan_rate:
    title: Top Indexes By Scan Rate
    database_scope: current_database
    source_query: metrics.objects_indexes_top_scan_rate
    requires_collection: every_snapshot
    top_n:
      mode: interval
      limit: 10
      key_refs: [dimensions.database, dimensions.index_id]
      label_refs: [dimensions.schema, dimensions.table, dimensions.index]
      value_ref: counters.idx_scan
      transform: rate
      unit: scans/s
    chart:
      kind: stacked_column
      unit: scans/s

  objects.indexes_top_tuple_read_rate:
    title: Top Indexes By Tuple Read Rate
    database_scope: current_database
    source_query: metrics.objects_indexes_top_tuple_read_rate
    requires_collection: every_snapshot
    top_n:
      mode: interval
      limit: 10
      key_refs: [dimensions.database, dimensions.index_id]
      label_refs: [dimensions.schema, dimensions.table, dimensions.index]
      value_ref: counters.idx_tup_read
      transform: rate
      unit: tuples/s
    chart:
      kind: stacked_column
      unit: tuples/s

  objects.indexes_top_tuple_fetch_rate:
    title: Top Indexes By Tuple Fetch Rate
    database_scope: current_database
    source_query: metrics.objects_indexes_top_tuple_fetch_rate
    requires_collection: every_snapshot
    top_n:
      mode: interval
      limit: 10
      key_refs: [dimensions.database, dimensions.index_id]
      label_refs: [dimensions.schema, dimensions.table, dimensions.index]
      value_ref: counters.idx_tup_fetch
      transform: rate
      unit: tuples/s
    chart:
      kind: stacked_column
      unit: tuples/s

  objects.indexes_top_reads_per_scan:
    title: Top Indexes By Tuples Read Per Scan
    database_scope: current_database
    source_query: metrics.objects_indexes_top_reads_per_scan
    requires_collection: every_snapshot
    top_n:
      mode: interval
      operation: ratio
      limit: 10
      key_refs: [dimensions.database, dimensions.index_id]
      label_refs: [dimensions.schema, dimensions.table, dimensions.index]
      numerator_refs: [counters.idx_tup_read]
      denominator_ref: counters.idx_scan
      series_name: tuples read / scan
      unit: ratio
    chart:
      kind: stacked_column
      unit: ratio

  objects.indexes_top_fetches_per_scan:
    title: Top Indexes By Heap Fetches Per Scan
    database_scope: current_database
    source_query: metrics.objects_indexes_top_fetches_per_scan
    requires_collection: every_snapshot
    top_n:
      mode: interval
      operation: ratio
      limit: 10
      key_refs: [dimensions.database, dimensions.index_id]
      label_refs: [dimensions.schema, dimensions.table, dimensions.index]
      numerator_refs: [counters.idx_tup_fetch]
      denominator_ref: counters.idx_scan
      series_name: heap fetches / scan
      unit: ratio
    chart:
      kind: stacked_column
      unit: ratio

  objects.indexes_top_reads_per_fetch:
    title: Top Indexes By Tuples Read Per Heap Fetch
    database_scope: current_database
    source_query: metrics.objects_indexes_top_reads_per_fetch
    requires_collection: every_snapshot
    top_n:
      mode: interval
      operation: ratio
      limit: 10
      key_refs: [dimensions.database, dimensions.index_id]
      label_refs: [dimensions.schema, dimensions.table, dimensions.index]
      numerator_refs: [counters.idx_tup_read]
      denominator_ref: counters.idx_tup_fetch
      series_name: tuples read / heap fetch
      unit: ratio
    chart:
      kind: stacked_column
      unit: ratio

  database.workload_delta:
    title: Database Workload Delta
    database_scope: all_databases
    source_query: metrics.database_workload_delta
    requires_collection: window_endpoints
    result: table
    display:
      default_sort:
        column: commits_per_sec
        direction: desc
    evaluation:
      summary_title: Deadlocks occurred during the snapshot window
      recommendation: Inspect lock ordering and the transactions involved; use PostgreSQL logs and the lock section to identify the conflicting paths.
      rules:
        - severity: medium
          reason: One or more deadlocks occurred during the snapshot window
          all:
            - column: deadlocks_delta
              operator: gt
              value: 0
    table:
      key_refs: [dimensions.database_id]
      epoch_refs: [dimensions.stats_reset]
      drop_zero_rows: false
      sort:
        column: commits_per_sec
        direction: desc
      columns:
        - name: datname
          value_ref: dimensions.database
          transform: last
          pg_type: text
        - name: datid
          role: key
          key_index: 0
          pg_type: oid
        - name: commit_delta
          value_ref: counters.xact_commit
          transform: delta
          pg_type: float8
        - name: commits_per_sec
          value_ref: counters.xact_commit
          transform: rate
          pg_type: float8
        - name: rollback_delta
          value_ref: counters.xact_rollback
          transform: delta
          pg_type: float8
        - name: rollbacks_per_sec
          value_ref: counters.xact_rollback
          transform: rate
          pg_type: float8
        - name: transactions_per_sec
          value_ref: counters.total_xacts
          transform: rate
          pg_type: float8
        - name: blks_read_delta
          value_ref: counters.blks_read
          transform: delta
          pg_type: float8
        - name: blks_hit_delta
          value_ref: counters.blks_hit
          transform: delta
          pg_type: float8
        - name: blks_read_bytes_delta
          value_ref: counters.blks_read_bytes
          transform: delta
          pg_type: float8
        - name: tup_returned_delta
          value_ref: counters.tup_returned
          transform: delta
          pg_type: float8
        - name: tup_fetched_delta
          value_ref: counters.tup_fetched
          transform: delta
          pg_type: float8
        - name: tup_inserted_delta
          value_ref: counters.tup_inserted
          transform: delta
          pg_type: float8
        - name: tup_updated_delta
          value_ref: counters.tup_updated
          transform: delta
          pg_type: float8
        - name: tup_deleted_delta
          value_ref: counters.tup_deleted
          transform: delta
          pg_type: float8
        - name: temp_files_delta
          value_ref: counters.temp_files
          transform: delta
          pg_type: float8
        - name: temp_bytes_delta
          value_ref: counters.temp_bytes
          transform: delta
          pg_type: float8
        - name: temp_bytes_per_sec
          value_ref: counters.temp_bytes
          transform: rate
          pg_type: float8
        - name: deadlocks_delta
          value_ref: counters.deadlocks
          transform: delta
          pg_type: float8
