        - {name: stream_count_delta, value_ref: counters.stream_count, transform: delta, pg_type: float8}
        - {name: stream_bytes_delta, value_ref: counters.stream_bytes, transform: delta, pg_type: float8}
        - {name: total_txns_delta, value_ref: counters.total_txns, transform: delta, pg_type: float8}
        - {name: total_bytes_delta, value_ref: counters.total_bytes, transform: delta, pg_type: float8}

  replication.subscription_errors_delta:
    title: Subscription Errors And Conflicts Delta
    database_scope: current_database
    source_query: metrics.subscription_errors_delta
    requires_collection: window_endpoints
    result: table
    display:
      default_sort: {column: apply_error_count_delta, direction: desc}
    evaluation:
      summary_title: Logical subscription errors or conflicts occurred
      recommendation: Inspect subscriber logs and the affected subscription before changing conflict handling or restarting workers.
      rules:
        - severity: medium
          reason: Logical subscription apply errors increased
          all: [{column: apply_error_count_delta, operator: gt, value: 0}]
        - severity: medium
          reason: Logical subscription synchronization errors increased
          all: [{column: sync_error_count_delta, operator: gt, value: 0}]
        - severity: medium
          reason: Logical subscription conflicts increased
          all: [{column: conflict_count_delta, operator: gt, value: 0}]
    table:
      key_refs: [dimensions.subscription_id]
      epoch_refs: [dimensions.stats_reset]
      limit: 50
      sort: {column: apply_error_count_delta, direction: desc}
      columns:
        - {name: datname, value_ref: dimensions.database, transform: last, pg_type: text}
        - {name: subname, value_ref: dimensions.subscription, transform: last, pg_type: text}
        - {name: subid, role: key, key_index: 0, pg_type: oid}
        - {name: apply_error_count_delta, value_ref: counters.apply_error_count, transform: delta, pg_type: float8}
        - {name: sync_error_count_delta, value_ref: counters.sync_error_count, transform: delta, pg_type: float8}
        - {name: conflict_count_delta, value_ref: counters.conflict_count, transform: delta, pg_type: float8}

  buffer_cache.utilization:
