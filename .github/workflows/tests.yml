name: tests

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --editable '.[dev]'
      - run: ruff check .
      - run: python -m pytest -q -p no:cacheprovider

  distribution:
    runs-on: ubuntu-24.04
    needs: unit
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install 'build>=1.2,<2' 'twine>=6,<7'
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Smoke-test built wheel
        shell: bash
        run: |
          python -m venv "${RUNNER_TEMP}/pg-diag-wheel-smoke"
          "${RUNNER_TEMP}/pg-diag-wheel-smoke/bin/python" -m pip install dist/*.whl
          "${RUNNER_TEMP}/pg-diag-wheel-smoke/bin/pg-diag" --version
          "${RUNNER_TEMP}/pg-diag-wheel-smoke/bin/pg-diag" validate
          "${RUNNER_TEMP}/pg-diag-wheel-smoke/bin/pg-diag" \
            --machine --component-capabilities
